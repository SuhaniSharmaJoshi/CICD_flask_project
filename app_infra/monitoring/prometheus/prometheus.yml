global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['PRIVATE_IP_PLACEHOLDER:9100']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
      
  - job_name: 'flask-app'
    static_configs:
      - targets: ['flask-app:5000']